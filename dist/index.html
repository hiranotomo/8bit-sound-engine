<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8-Bit Sound Engine Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-uJ3OUh3b.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DBY8yP_R.css">
</head>
<body>

  <!-- Background stars -->
  <div class="stars"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1>&#9835; 8BIT SOUND ENGINE &#9835;</h1>
      <p class="subtitle">RETRO AUDIO FOR THE MODERN WEB</p>
    </header>

    <!-- BGM Section -->
    <section class="pixel-card">
      <h2 class="card-title">&#9654; BGM</h2>
      <div class="btn-row">
        <button class="pixel-btn" data-bgm="overworld">OVERWORLD</button>
        <button class="pixel-btn" data-bgm="dungeon">DUNGEON</button>
        <button class="pixel-btn" data-bgm="battle">BATTLE</button>
      </div>
      <div class="btn-row">
        <button class="pixel-btn" data-bgm="stop">&#9632; STOP</button>
      </div>
      <div class="now-playing" id="now-playing">STOPPED</div>
    </section>

    <!-- Sound Effects Section -->
    <section class="pixel-card">
      <h2 class="card-title">&#9733; SOUND EFFECTS</h2>
      <div class="btn-row">
        <button class="pixel-btn" data-se="jump">JUMP</button>
        <button class="pixel-btn" data-se="coin">COIN</button>
        <button class="pixel-btn" data-se="damage">DAMAGE</button>
      </div>
      <div class="btn-row">
        <button class="pixel-btn" data-se="powerup">POWERUP</button>
        <button class="pixel-btn" data-se="gameover">GAMEOVER</button>
        <button class="pixel-btn" data-se="select">SELECT</button>
      </div>
      <div class="btn-row">
        <button class="pixel-btn" data-se="cancel">CANCEL</button>
        <button class="pixel-btn" data-se="explosion">EXPLOSION</button>
        <button class="pixel-btn" data-se="laser">LASER</button>
      </div>
      <div class="btn-row">
        <button class="pixel-btn" data-se="1up">1UP</button>
      </div>
    </section>

    <!-- Channel Visualization -->
    <section class="pixel-card">
      <h2 class="card-title">&#9836; CHANNELS</h2>

      <div class="channel-row">
        <span class="channel-label">
          <span class="channel-indicator pulse1"></span> Pulse 1
        </span>
        <div class="channel-bar-track">
          <div class="channel-bar-fill pulse1" style="width: 0%"></div>
        </div>
      </div>

      <div class="channel-row">
        <span class="channel-label">
          <span class="channel-indicator pulse2"></span> Pulse 2
        </span>
        <div class="channel-bar-track">
          <div class="channel-bar-fill pulse2" style="width: 0%"></div>
        </div>
      </div>

      <div class="channel-row">
        <span class="channel-label">
          <span class="channel-indicator triangle"></span> Triangle
        </span>
        <div class="channel-bar-track">
          <div class="channel-bar-fill triangle" style="width: 0%"></div>
        </div>
      </div>

      <div class="channel-row">
        <span class="channel-label">
          <span class="channel-indicator noise"></span> Noise
        </span>
        <div class="channel-bar-track">
          <div class="channel-bar-fill noise" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span class="hint">Click any button to start. Browser requires user interaction for audio.</span>
      Built with Web Audio API
    </footer>

  </div>

</body>
</html>
