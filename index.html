<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8-Bit Sound Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Pixel art scene background -->
  <div class="scene">
    <!-- Sky layers -->
    <div class="sky"></div>
    <div class="clouds">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
    </div>
    <!-- Mountains -->
    <div class="mountains">
      <div class="mountain mountain-far-1"></div>
      <div class="mountain mountain-far-2"></div>
      <div class="mountain mountain-near-1"></div>
      <div class="mountain mountain-near-2"></div>
    </div>
    <!-- Trees -->
    <div class="trees">
      <div class="tree tree-1"></div>
      <div class="tree tree-2"></div>
      <div class="tree tree-3"></div>
      <div class="tree tree-4"></div>
      <div class="tree tree-5"></div>
    </div>
    <!-- Ground -->
    <div class="ground"></div>
    <div class="ground-detail"></div>
    <!-- Animated elements -->
    <div class="campfire">
      <div class="fire"></div>
      <div class="fire-glow"></div>
    </div>
    <div class="character">
      <div class="fox"></div>
    </div>
    <!-- Floating music notes -->
    <div class="floating-notes" id="floating-notes"></div>
  </div>

  <!-- Main UI -->
  <div class="container">

    <!-- Title scroll/banner -->
    <header class="scroll-banner">
      <div class="scroll-top"></div>
      <div class="scroll-body">
        <h1>8BIT SOUND ENGINE</h1>
        <p class="subtitle">~ Adventure Awaits ~</p>
      </div>
      <div class="scroll-bottom"></div>
    </header>

    <!-- BGM Section - styled as a wooden sign board -->
    <section class="wood-panel">
      <div class="panel-header">
        <span class="panel-icon">&#9834;</span> MUSIC
      </div>
      <div class="panel-content">
        <div class="btn-row">
          <button class="game-btn btn-forest" data-bgm="office">
            <span class="btn-icon">&#127970;</span> OFFICE
          </button>
          <button class="game-btn btn-cave" data-bgm="nature">
            <span class="btn-icon">&#127793;</span> NATURE
          </button>
        </div>
        <div class="btn-row">
          <button class="game-btn btn-stop" data-bgm="stop">
            <span class="btn-icon">&#9632;</span> STOP
          </button>
        </div>
        <div class="now-playing" id="now-playing">
          <span class="now-playing-text">Silence...</span>
        </div>
        <!-- Variation buttons (hidden until BGM selected) -->
        <div class="variation-panel" id="variation-panel" style="display:none;">
          <div class="layer-title">ARRANGEMENT</div>
          <div class="layer-row" id="variation-buttons"></div>
        </div>
      </div>
    </section>

    <!-- SE Section - styled as a treasure chest / inventory -->
    <section class="wood-panel">
      <div class="panel-header">
        <span class="panel-icon">&#9733;</span> SOUND EFFECTS
      </div>
      <div class="panel-content">
        <div class="se-grid">
          <button class="item-btn" data-se="jump">
            <span class="item-icon">&#8593;</span>
            <span class="item-label">JUMP</span>
          </button>
          <button class="item-btn" data-se="coin">
            <span class="item-icon">&#9679;</span>
            <span class="item-label">COIN</span>
          </button>
          <button class="item-btn" data-se="damage">
            <span class="item-icon">&#10007;</span>
            <span class="item-label">DAMAGE</span>
          </button>
          <button class="item-btn" data-se="powerup">
            <span class="item-icon">&#9733;</span>
            <span class="item-label">POWERUP</span>
          </button>
          <button class="item-btn" data-se="gameover">
            <span class="item-icon">&#9760;</span>
            <span class="item-label">GAMEOVER</span>
          </button>
          <button class="item-btn" data-se="select">
            <span class="item-icon">&#9654;</span>
            <span class="item-label">SELECT</span>
          </button>
          <button class="item-btn" data-se="cancel">
            <span class="item-icon">&#10005;</span>
            <span class="item-label">CANCEL</span>
          </button>
          <button class="item-btn" data-se="explosion">
            <span class="item-icon">&#10026;</span>
            <span class="item-label">BOOM</span>
          </button>
          <button class="item-btn" data-se="laser">
            <span class="item-icon">&#10148;</span>
            <span class="item-label">LASER</span>
          </button>
          <button class="item-btn" data-se="1up">
            <span class="item-icon">&#9829;</span>
            <span class="item-label">1UP</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Channel Visualization - styled as magic crystals -->
    <section class="wood-panel">
      <div class="panel-header">
        <span class="panel-icon">&#9830;</span> CHANNELS
      </div>
      <div class="panel-content">
        <div class="channel-row">
          <span class="channel-label">
            <span class="crystal crystal-green"></span> Pulse 1
          </span>
          <div class="channel-bar-track">
            <div class="channel-bar-fill pulse1" style="width: 0%"></div>
          </div>
        </div>
        <div class="channel-row">
          <span class="channel-label">
            <span class="crystal crystal-blue"></span> Pulse 2
          </span>
          <div class="channel-bar-track">
            <div class="channel-bar-fill pulse2" style="width: 0%"></div>
          </div>
        </div>
        <div class="channel-row">
          <span class="channel-label">
            <span class="crystal crystal-orange"></span> Triangle
          </span>
          <div class="channel-bar-track">
            <div class="channel-bar-fill triangle" style="width: 0%"></div>
          </div>
        </div>
        <div class="channel-row">
          <span class="channel-label">
            <span class="crystal crystal-pink"></span> Noise
          </span>
          <div class="channel-bar-track">
            <div class="channel-bar-fill noise" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Mixer Panel -->
    <section class="wood-panel">
      <div class="panel-header">
        <span class="panel-icon">&#9881;</span> MIXER
      </div>
      <div class="panel-content">
        <div class="mixer-row">
          <span class="mixer-label">REVERB</span>
          <input type="range" class="pixel-slider" id="reverb-mix" min="0" max="100" value="20" />
          <span class="mixer-value" id="reverb-value">20%</span>
        </div>
        <div class="mixer-row">
          <span class="mixer-label">MELODY PAN</span>
          <input type="range" class="pixel-slider" id="melody-pan" min="-100" max="100" value="25" />
          <span class="mixer-value" id="melody-pan-value">R 25</span>
        </div>
        <div class="mixer-row">
          <span class="mixer-label">BASS PAN</span>
          <input type="range" class="pixel-slider" id="bass-pan" min="-100" max="100" value="-25" />
          <span class="mixer-value" id="bass-pan-value">L 25</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span class="hint">Click any button to begin your adventure!</span>
      <span>Built with Web Audio API</span>
    </footer>

  </div>

  <script type="module" src="/demo/main.ts"></script>
</body>
</html>
